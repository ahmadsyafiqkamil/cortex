[pytest]
# Run from the agent/ directory. pythonpath = . makes the top-level packages
# (cortex_cli, chain, walrus, llm) importable the same way `python -m cortex_cli` sees them.
pythonpath = .
testpaths = tests
markers =
    unit: fast, isolated tests with no network/chain/LLM/walrus dependencies
    integration: tests that exercise live external services (sui, walrus, LLM)
