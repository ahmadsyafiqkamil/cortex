# Cortex — full stack dev + portal + proxy.
#
# Services:
#   cortex-dev     — dev container (sui, walrus, site-builder, python, node)
#   walrus-portal  — Walrus Sites portal (serves testnet sites)
#   nginx          — reverse proxy on port 3000 (rewrites host -> portal)
#
# State that must survive container rebuilds lives in NAMED VOLUMES:
#   - sui-config     -> Sui keystore (Agent A & B private keys)
#   - walrus-config  -> Walrus client + sites config
# The repo is bind-mounted; agent/.cortex/ persists on the host (gitignored).

services:
  cortex-dev:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    image: cortex-dev:latest
    container_name: cortex-dev
    working_dir: /workspace
    tty: true
    stdin_open: true
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - sui-config:/home/cortex/.sui
      - walrus-config:/home/cortex/.config/walrus
    entrypoint: ["/workspace/scripts/dev-entrypoint.sh"]
    command: ["sleep", "infinity"]
    networks:
      - cortex-net

  walrus-portal:
    image: mysten/walrus-sites-server-portal:mainnet-v2.10.0
    container_name: cortex-portal
    restart: always
    volumes:
      - ./site/portal-config.yaml:/portal-config.yaml:ro
    environment:
      - PORTAL_CONFIG=/portal-config.yaml
    ports:
      - "3001:3000"
    networks:
      - cortex-net

  nginx:
    image: nginx:alpine
    container_name: cortex-nginx
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cortex-net
    depends_on:
      - walrus-portal

volumes:
  sui-config:
  walrus-config:

networks:
  cortex-net:
