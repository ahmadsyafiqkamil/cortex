# cortex nginx reverse proxy — runs in docker compose.
# listens on port 3000, extracts base36 subdomain from host header
# and rewrites to <base36>.localhost before forwarding to walrus portal.

server {
    listen 3000;

    # format: base36.ip.nip.io
    server_name ~^(?<base36>.+)\.\d+\.\d+\.\d+\.\d+\.nip\.io$;

    location / {
        proxy_set_header Host "$base36.localhost";
        proxy_pass http://walrus-portal:3000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# root request -> portal landing page
server {
    listen 3000 default_server;
    server_name _;

    location / {
        proxy_set_header Host "localhost";
        proxy_pass http://walrus-portal:3000;
        proxy_http_version 1.1;
    }
}
