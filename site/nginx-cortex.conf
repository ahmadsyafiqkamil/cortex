# cortex site ingress - reverse proxy.
# nginx listens on 3000, rewrites Host header to <subdomain>.localhost,
# and forwards to Walrus portal on 3001.

server {
    listen 3000;

    # match nip.io wildcard subdomain
    server_name ~^(?<base36>.+)\.(?<ip>\d+\.\d+\.\d+\.\d+)\.nip\.io$;

    location / {
        proxy_set_header Host "$base36.localhost";
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# fallback: direct IP + subdomain tanpa nip.io
server {
    listen 3000;

    server_name ~^(?<base36>.+)\.(?<ip>\d+\.\d+\.\d+\.\d+)$;

    location / {
        proxy_set_header Host "$base36.localhost";
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# root request -> portal landing page
server {
    listen 3000 default_server;
    server_name _;
    location / {
        proxy_set_header Host "localhost";
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
    }
}
