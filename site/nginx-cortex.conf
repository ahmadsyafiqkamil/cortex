# cortex site ingress - reverse proxy. redirects
# public domain subdomain requests to the walrus portal,
# rewriting the host header to <subdomain>.localhost.

server {
    listen 80;
    
    # match nip.io wildcard or direct ip subdomains
    server_name ~^(?<base36>.+)\.(?<ip>\d+\.\d+\.\d+\.\d+)(\.nip\.io)?$;
    
    location / {
        proxy_set_header Host "$base36.localhost";
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# serve the landing/default site when no subdomain matches
server {
    listen 80 default_server;
    server_name _;
    location / {
        proxy_set_header Host "localhost";
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
    }
}
